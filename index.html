<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --panel: #16161f;
      --border: #2a2a3a;
      --accent: #e8ff47;
      --danger: #ff4757;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 20% 50%, #1a1a2e 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #0f0f1e 0%, transparent 50%);
    }

    .player-wrap {
      width: 100%;
      max-width: 780px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .session-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .end-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1.5px solid var(--danger);
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .end-btn:hover {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 0 18px rgba(255,71,87,0.4);
    }

    .end-btn:active { transform: scale(0.96); }

    .end-btn svg { transition: transform 0.2s; }
    .end-btn:hover svg { transform: rotate(90deg); }

    /* ── Video Stage ── */
    .stage {
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      aspect-ratio: 16/9;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* Placeholder shown when no src */
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: linear-gradient(135deg, #0d0d18 0%, #111120 100%);
    }

    .placeholder svg { opacity: 0.25; }

    .placeholder-text {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Big play overlay */
    .big-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .stage:hover .big-play,
    .stage.paused .big-play { opacity: 1; pointer-events: auto; }

    .big-play-btn {
      width: 68px; height: 68px;
      background: rgba(232,255,71,0.12);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: transform 0.15s, background 0.15s;
    }

    .big-play-btn:hover {
      transform: scale(1.1);
      background: rgba(232,255,71,0.22);
    }

    /* ── Controls Bar ── */
    .controls {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 14px 18px 16px;
    }

    /* Progress */
    .progress-wrap {
      position: relative;
      height: 4px;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-buf {
      height: 100%;
      background: #2a2a3a;
      border-radius: 4px;
      transition: width 0.3s;
      position: absolute; top: 0; left: 0;
    }

    .progress-fill {
      height: 4px;
      background: var(--accent);
      border-radius: 4px;
      position: absolute; top: 0; left: 0;
      transition: width 0.1s;
    }

    .progress-thumb {
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
      top: 50%; transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(232,255,71,0.5);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .progress-wrap:hover .progress-thumb { opacity: 1; }

    input[type=range] {
      position: absolute; inset: -6px 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
    }

    /* Bottom row */
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .ctrl-btn.active { color: var(--accent); }

    .time-display {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      user-select: none;
    }

    .spacer { flex: 1; }

    /* Volume */
    .vol-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vol-slider-wrap {
      width: 70px;
      position: relative;
      height: 4px;
    }

    .vol-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .vol-fill {
      height: 100%;
      background: var(--muted);
      border-radius: 4px;
      transition: width 0.1s, background 0.1s;
    }

    .vol-slider-wrap:hover .vol-fill { background: var(--accent); }

    .vol-slider-wrap input[type=range] { position: absolute; inset: -6px 0; opacity: 0; cursor: pointer; width: 100%; }

    /* Upload CTA */
    .upload-zone {
      margin-top: 16px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: rgba(232,255,71,0.03);
    }

    .upload-zone input { display: none; }

    .upload-info { display: flex; align-items: center; gap: 10px; }

    .upload-text {
      font-size: 13px;
      color: var(--muted);
    }

    .upload-text strong { color: var(--text); font-weight: 500; }

    .upload-hint {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* End session overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.show { opacity: 1; pointer-events: auto; }

    .dialog {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    .overlay.show .dialog { transform: scale(1); }

    .dialog-icon {
      width: 56px; height: 56px;
      background: rgba(255,71,87,0.1);
      border: 1.5px solid var(--danger);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    .dialog h2 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .dialog p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .dialog-btns {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: var(--border); }

    .btn-end {
      flex: 1;
      padding: 12px;
      background: var(--danger);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-end:hover { opacity: 0.88; }
    .btn-end:active { transform: scale(0.97); }

    /* Ended state */
    .ended-state {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .ended-state.show { opacity: 1; pointer-events: auto; }

    .ended-state h3 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .ended-state p { font-size: 14px; color: var(--muted); }

    .replay-btn {
      margin-top: 8px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .replay-btn:hover { opacity: 0.85; transform: scale(1.04); }
  </style>
</head>
<body>

<div class="player-wrap">

  <!-- Header -->
  <div class="header">
    <div class="session-label">
      <span class="dot"></span>
      Session Active
    </div>
    <button class="end-btn" id="endBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      End Session
    </button>
  </div>

  <!-- Stage -->
  <div class="stage paused" id="stage">
    <video id="vid"></video>

    <!-- Placeholder -->
    <div class="placeholder" id="placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#e8e8f0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span class="placeholder-text">Load a video to begin</span>
    </div>

    <!-- Big play/pause overlay -->
    <div class="big-play" id="bigPlay">
      <div class="big-play-btn" id="bigPlayBtn">
        <svg id="bigPlayIcon" width="26" height="26" viewBox="0 0 24 24" fill="var(--accent)" stroke="none">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
    </div>

    <!-- Ended overlay -->
    <div class="ended-state" id="endedState">
      <h3>Playback complete</h3>
      <p>Your video has finished playing.</p>
      <button class="replay-btn" id="replayBtn">↺ Replay</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Progress -->
    <div class="progress-wrap" id="progWrap">
      <div class="progress-track">
        <div class="progress-buf" id="progBuf" style="width:0%"></div>
        <div class="progress-fill" id="progFill" style="width:0%"></div>
      </div>
      <div class="progress-thumb" id="progThumb" style="left:0%"></div>
      <input type="range" id="seekSlider" min="0" max="100" value="0" step="0.1"/>
    </div>

    <!-- Buttons row -->
    <div class="ctrl-row">

      <!-- Play/Pause -->
      <button class="ctrl-btn" id="playBtn" title="Play / Pause">
        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>

      <!-- Skip back -->
      <button class="ctrl-btn" id="skipBack" title="-10s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.32"/>
        </svg>
      </button>

      <!-- Skip forward -->
      <button class="ctrl-btn" id="skipFwd" title="+10s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.32"/>
        </svg>
      </button>

      <!-- Time -->
      <span class="time-display" id="timeDis">0:00 / 0:00</span>

      <div class="spacer"></div>

      <!-- Volume -->
      <div class="vol-group">
        <button class="ctrl-btn" id="muteBtn" title="Mute">
          <svg id="volIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </button>
        <div class="vol-slider-wrap">
          <div class="vol-track"><div class="vol-fill" id="volFill" style="width:100%"></div></div>
          <input type="range" id="volSlider" min="0" max="1" step="0.02" value="1"/>
        </div>
      </div>

      <!-- Fullscreen -->
      <button class="ctrl-btn" id="fsBtn" title="Fullscreen">
        <svg id="fsIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>

    </div>
  </div>

  <!-- Upload zone -->
  <label class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="video/*"/>
    <div class="upload-info">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <div>
        <div class="upload-text"><strong>Click to load video</strong> or drag & drop</div>
        <div class="upload-hint">MP4 · MOV · WEBM · MKV</div>
      </div>
    </div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </label>

</div>

<!-- End Session Dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dialog-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h2>End this session?</h2>
    <p>Your current playback progress will be lost and the session will be closed.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-end" id="confirmEnd">End Session</button>
    </div>
  </div>
</div>

<script>
  const vid = document.getElementById('vid');
  const stage = document.getElementById('stage');
  const placeholder = document.getElementById('placeholder');
  const bigPlay = document.getElementById('bigPlay');
  const bigPlayBtn = document.getElementById('bigPlayBtn');
  const bigPlayIcon = document.getElementById('bigPlayIcon');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const seekSlider = document.getElementById('seekSlider');
  const progFill = document.getElementById('progFill');
  const progBuf  = document.getElementById('progBuf');
  const progThumb = document.getElementById('progThumb');
  const timeDis = document.getElementById('timeDis');
  const volSlider = document.getElementById('volSlider');
  const volFill = document.getElementById('volFill');
  const muteBtn = document.getElementById('muteBtn');
  const volIcon = document.getElementById('volIcon');
  const fsBtn = document.getElementById('fsBtn');
  const skipBack = document.getElementById('skipBack');
  const skipFwd = document.getElementById('skipFwd');
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const endBtn = document.getElementById('endBtn');
  const overlay = document.getElementById('overlay');
  const cancelBtn = document.getElementById('cancelBtn');
  const confirmEnd = document.getElementById('confirmEnd');
  const endedState = document.getElementById('endedState');
  const replayBtn = document.getElementById('replayBtn');

  const PLAY_SVG  = `<polygon points="5 3 19 12 5 21 5 3"/>`;
  const PAUSE_SVG = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
  const VOL_SVG   = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>`;
  const MUTE_SVG  = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;

  function fmt(s) {
    s = Math.floor(s || 0);
    const m = Math.floor(s / 60), sec = s % 60;
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function updatePlayIcon(paused) {
    const svg = `<svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">${paused ? PLAY_SVG : PAUSE_SVG}</svg>`;
    playBtn.innerHTML = svg;
    bigPlayIcon.innerHTML = paused ? PLAY_SVG : PAUSE_SVG;
    stage.classList.toggle('paused', paused);
  }

  function togglePlay() {
    if (!vid.src) return;
    vid.paused ? vid.play() : vid.pause();
  }

  vid.addEventListener('play',  () => updatePlayIcon(false));
  vid.addEventListener('pause', () => updatePlayIcon(true));

  vid.addEventListener('timeupdate', () => {
    const pct = vid.duration ? (vid.currentTime / vid.duration) * 100 : 0;
    progFill.style.width = pct + '%';
    progThumb.style.left = pct + '%';
    seekSlider.v        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="regEmail" placeholder="Enter your email address"/>
          </div>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <div class="input-wrap">
            <span class="input-icon">📱</span>
            <input type="tel" id="regMobile" placeholder="10-digit mobile number" maxlength="10"/>
          </div>
        </div>
        <div class="form-group">
          <label>Choose Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="regUser" placeholder="Create a unique username"/>
          </div>
        </div>
        <div class="form-group">
          <label>Create Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="regPass" placeholder="Min 8 chars, mix of letters & numbers" oninput="checkStrength(this.value)"/>
            <button type="button" class="eye-btn" onclick="togglePwd('regPass',this)">👁️</button>
          </div>
          <div class="strength-bar" id="strengthBar"></div>
          <div class="strength-label" id="strengthLabel" style="color:var(--text-soft)"></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="regConfirm" placeholder="Re-enter your password"/>
            <button type="button" class="eye-btn" onclick="togglePwd('regConfirm',this)">👁️</button>
          </div>
        </div>
        <div class="form-group">

            <div class="input-wrap captcha-input">
              <span class="input-icon">🔠</span>
              <input type="text" id="regCaptcha" placeholder="Type captcha" maxlength="6"/>
            </div>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label class="checkbox-label" style="text-transform:none;font-size:13px;letter-spacing:0;">
            <input type="checkbox" id="agreeTerms"/>
            I agree to the <a href="#" style="color:var(--teal)">Terms &amp; Conditions</a>
          </label>
        </div>
        <button class="btn-submit" onclick="doRegister()">Create Account →</button>
      </div>
    </div>

    <div class="info-panel">
      <div class="info-card">
        <h3><span class="dot"></span> Banking Services</h3>
        <div class="info-item">
          <div class="info-item-icon blue">💳</div>
          <div class="info-item-text"><strong>Account Summary</strong><span>Balances, statements & history</span></div>
        </div>
        <div class="info-item">
          <div class="info-item-icon navy2">💸</div>
          <div class="info-item-text"><strong>Fund Transfers</strong><span>NEFT, RTGS, IMPS & UPI</span></div>
        </div>
        <div class="info-item">
          <div class="info-item-icon redg">🧾</div>
          <div class="info-item-text"><strong>Bill Payments</strong><span>Utilities, taxes & insurance</span></div>
        </div>
        <div class="info-item">
          <div class="info-item-icon goldg">📈</div>
          <div class="info-item-text"><strong>Investments</strong><span>FD, RD & Mutual Funds</span></div>
        </div>
      </div>
      <div class="help-card">
        <h4>Need Assistance?</h4>
        <p>24×7 helpline for all queries</p>
        <div class="help-number">1800 1111</div>
        <a href="#">📞 Call Now</a><a href="#">💬 Live Chat</a>
      </div>
    </div>
  </main>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 id="dashGreet">Welcome!</h2>
        <p id="dashSub">Logged in just now</p>
      </div>
      <button class="btn-logout" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>
  <div class="dash-body">
    <div class="dash-card">
      <h3><span class="dot"></span> Your Account Details</h3>
      <div id="userDetails"></div>
    </div>
    <div class="dash-card">
      <h3><span class="dot"></span> All Registered Users</h3>
      <div style="overflow-x:auto;">
        <table class="users-table">
          <thead>
            <tr><th>#</th><th>Name</th><th>Username</th><th>Email</th><th>Mobile</th><th>Registered</th><th>Action</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer>
  <div style="margin-bottom:8px;">
    <a href="#">Privacy Policy</a><a href="#">Terms of Use</a><a href="#">Disclaimer</a><a href="#">Sitemap</a>
  </div>
  © 2025 State Bank of India. All rights reserved.
</footer>

<script>
  // ── Helpers ───────────────────────────────────────
  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  function genCap() { let s=''; for(let i=0;i<6;i++) s+=CHARS[Math.floor(Math.random()*CHARS.length)]; return s; }
  function refreshCaptcha(id) { document.getElementById(id).textContent = genCap(); }

  function togglePwd(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type==='password' ? 'text' : 'password';
    btn.textContent = el.type==='password' ? '👁️' : '🙈';
  }

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className=`toast ${type} show`;
    setTimeout(()=>t.classList.remove('show'), 3600);
  }

  function checkStrength(v) {
    const bar=document.getElementById('strengthBar'), lbl=document.getElementById('strengthLabel');
    if(!v){bar.className='strength-bar';lbl.textContent='';return;}
    let s=0;
    if(v.length>=8)s++;
    if(/[A-Z]/.test(v))s++;
    if(/[0-9]/.test(v))s++;
    if(/[^A-Za-z0-9]/.test(v))s++;
    if(s<=1){bar.className='strength-bar weak';lbl.textContent='Weak';lbl.style.color='#c0392b';}
    else if(s<=2){bar.className='strength-bar medium';lbl.textContent='Medium';lbl.style.color='#e8a020';}
    else{bar.className='strength-bar strong';lbl.textContent='Strong ✓';lbl.style.color='#1a7a4a';}
  }

  // ── Storage ───────────────────────────────────────
  const getUsers   = ()=>JSON.parse(localStorage.getItem('sbi_users')||'[]');
  const saveUsers  = u=>localStorage.setItem('sbi_users',JSON.stringify(u));
  const setSession = u=>sessionStorage.setItem('sbi_sess',JSON.stringify(u));
  const getSession = ()=>JSON.parse(sessionStorage.getItem('sbi_sess')||'null');
  const clearSess  = ()=>sessionStorage.removeItem('sbi_sess');

  // ── Mode ──────────────────────────────────────────
  function setMode(mode) {
    const isLogin = mode==='login';
    document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
    document.getElementById('btnLogin').classList.toggle('active', isLogin);
    document.getElementById('btnRegister').classList.toggle('active', !isLogin);
    document.getElementById('cardTitle').textContent = isLogin ? 'Welcome Back' : 'Create Account';
    document.getElementById('cardSub').textContent   = isLogin ? 'Sign in to your SBI Net Banking account' : 'Register for SBI Net Banking';
    document.getElementById('cardTag').textContent   = isLogin ? 'Personal Banking' : 'New Registration';
  }

  // ── Register ──────────────────────────────────────
  function doRegister() {
    const name    = document.getElementById('regName').value.trim();
    const email   = document.getElementById('regEmail').value.trim();
    const mobile  = document.getElementById('regMobile').value.trim();
    const user    = document.getElementById('regUser').value.trim();
    const pass    = document.getElementById('regPass').value;
    const confirm = document.getElementById('regConfirm').value;
    const cap     = document.getElementById('regCaptcha').value.trim().toUpperCase();
    const capOk   = document.getElementById('regCaptchaBox').textContent;
    const agree   = document.getElementById('agreeTerms').checked;

    if(!name||!email||!mobile||!user||!pass||!confirm){toast('Please fill in all fields.','error');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Enter a valid email address.','error');return;}
    if(!/^\d{10}$/.test(mobile)){toast('Enter a valid 10-digit mobile number.','error');return;}
    if(pass.length<8){toast('Password must be at least 8 characters.','error');return;}
    if(pass!==confirm){toast('Passwords do not match.','error');return;}
    if(cap!==capOk){toast('Incorrect captcha. Try again.','error');refreshCaptcha('regCaptchaBox');return;}
    if(!agree){toast('Please accept the Terms & Conditions.','error');return;}

    const users=getUsers();
    if(users.find(u=>u.username.toLowerCase()===user.toLowerCase())){toast('Username already taken.','error');return;}
    if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())){toast('Email already registered.','error');return;}

    users.push({
      id: Date.now(), name, email, mobile,
      username: user,
      password: btoa(pass),
      registeredAt: new Date().toLocaleString('en-IN')
    });
    saveUsers(users);
    toast(`✅ Account created! Welcome, ${name}.`);
    ['regName','regEmail','regMobile','regUser','regPass','regConfirm','regCaptcha'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('agreeTerms').checked=false;
    document.getElementById('strengthBar').className='strength-bar';
    document.getElementById('strengthLabel').textContent='';
    refreshCaptcha('regCaptchaBox');
    setTimeout(()=>setMode('login'), 1800);
  }

  // ── Login ─────────────────────────────────────────
  function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const cap  = document.getElementById('loginCaptcha').value.trim().toUpperCase();
    const capOk= document.getElementById('loginCaptchaBox').textContent;

    if(!user||!pass){toast('Please enter username and password.','error');return;}
    if(cap!==capOk){toast('Incorrect captcha. Try again.','error');refreshCaptcha('loginCaptchaBox');return;}

    const found=getUsers().find(u=>u.username.toLowerCase()===user.toLowerCase()&&u.password===btoa(pass));
    if(!found){toast('Invalid username or password.','error');refreshCaptcha('loginCaptchaBox');return;}

    if(document.getElementById('rememberMe').checked)
      localStorage.setItem('sbi_remember', user);

    setSession(found);
    toast(`✅ Login successful! Welcome, ${found.name}!`);
    setTimeout(showDashboard, 1000);
  }

  function handleRemember() {
    if(!document.getElementById('rememberMe').checked)
      localStorage.removeItem('sbi_remember');
  }

  // ── Forgot ────────────────────────────────────────
  function forgotPassword(e) {
    e.preventDefault();
    const u = prompt('Enter your registered username:');
    if(!u) return;
    const found=getUsers().find(x=>x.username.toLowerCase()===u.toLowerCase());
    if(!found){toast('Username not found.','error');return;}
    toast(`📧 Reset link sent to ${found.email.replace(/(.{2}).+(@.+)/,'$1***$2')}`);
  }

  // ── Dashboard ─────────────────────────────────────
  function showDashboard() {
    const s=getSession(); if(!s) return;
    document.getElementById('authSection').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('dashGreet').textContent=`Welcome, ${s.name} 👋`;
    document.getElementById('dashSub').textContent=`Logged in as @${s.username} · ${new Date().toLocaleString('en-IN')}`;

    document.getElementById('userDetails').innerHTML=`
      <div class="user-row"><span class="key">Full Name</span><span class="val">${s.name}</span></div>
      <div class="user-row"><span class="key">Username</span><span class="val">@${s.username}</span></div>
      <div class="user-row"><span class="key">Email</span><span class="val">${s.email}</span></div>
      <div class="user-row"><span class="key">Mobile</span><span class="val">${s.mobile}</span></div>
      <div class="user-row"><span class="key">Registered</span><span class="val">${s.registeredAt}</span></div>
    `;
    renderUsersTable(s.id);
  }

  function renderUsersTable(currentId) {
    const users=getUsers();
    document.getElementById('usersTableBody').innerHTML = users.length===0
      ? '<tr><td colspan="7" style="text-align:center;color:var(--text-soft);padding:20px;">No users registered yet.</td></tr>'
      : users.map((u,i)=>`
        <tr>
          <td>${i+1}</td>
          <td>${u.name}</td>
          <td>@${u.username} ${u.id===currentId?'<span class="badge">You</span>':''}</td>
          <td>${u.email}</td>
          <td>${u.mobile}</td>
          <td>${u.registeredAt}</td>
          <td>${u.id!==currentId?`<button class="btn-delete" onclick="deleteUser(${u.id})">🗑 Delete</button>`:'—'}</td>
        </tr>`).join('');
  }

  function deleteUser(id) {
    if(!confirm('Delete this user?')) return;
    saveUsers(getUsers().filter(u=>u.id!==id));
    renderUsersTable(getSession().id);
    toast('User deleted.');
  }

  function doLogout() {
    clearSess();
    document.getElementById('dashboard').style.display='none';
    document.getElementById('authSection').style.display='block';
    document.getElementById('loginUser').value='';
    document.getElementById('loginPass').value='';
    refreshCaptcha('loginCaptchaBox');
    toast('Logged out securely.');
  }

  // ── Init ──────────────────────────────────────────
  window.onload=()=>{
    refreshCaptcha('loginCaptchaBox');
    refreshCaptcha('regCaptchaBox');
    const rem=localStorage.getItem('sbi_remember');
    if(rem){ document.getElementById('loginUser').value=rem; document.getElementById('rememberMe').checked=true; }
    if(getSession()) showDashboard();
  };
</script>
</body>
</html>
